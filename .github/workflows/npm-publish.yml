        }

        /* ANIMATIONS */
        @keyframes fadeInUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
        .anim-1{animation:fadeInUp 0.9s ease both;}
        .anim-2{animation:fadeInUp 0.9s 0.15s ease both;}
        .anim-3{animation:fadeInUp 0.9s 0.3s ease both;}
        .anim-4{animation:fadeInUp 0.9s 0.45s ease both;}
      `}</style>

      {/* NAV */}
      <nav className="nav-fixed">
        <div className="nav-inner">
          <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>scrollTo('hero')}>
            <img src={LOGO_B64} alt="Golden Care Style Logo" className="nav-logo-img" />
            <div>
              <div className="nav-brand">Golden Care Style</div>
              <div className="nav-sub">Antilia · Health &amp; Beauty</div>
            </div>
          </div>
          <div className="nav-links">
            <button className="nav-link" onClick={()=>scrollTo('products')}>Products</button>
            <button className="nav-link" onClick={()=>scrollTo('reviews')}>Reviews</button>
            <button className="nav-link" onClick={()=>scrollTo('contact')}>Contact</button>
            <button className="nav-cta" onClick={()=>scrollTo('products')}>Order Now</button>
          </div>
          <div className="hamburger" onClick={()=>setMobileMenu(!mobileMenu)}>
            <span style={{transform:mobileMenu?"rotate(45deg) translate(5px,5px)":"none"}}></span>
            <span style={{opacity:mobileMenu?0:1}}></span>
            <span style={{transform:mobileMenu?"rotate(-45deg) translate(5px,-5px)":"none"}}></span>
          </div>
        </div>
        <div className={`mobile-menu${mobileMenu?" open":""}`}>
          <div className="mobile-nav-link" onClick={()=>scrollTo('products')}>Products</div>
          <div className="mobile-nav-link" onClick={()=>scrollTo('reviews')}>Reviews</div>
          <div className="mobile-nav-link" onClick={()=>scrollTo('contact')}>Contact</div>
          <button className="nav-cta" style={{marginTop:4}} onClick={()=>scrollTo('products')}>Order Now</button>
        </div>
      </nav>

      {/* HERO */}
      <section className="hero sparkle-bg" id="hero">
        <div style={{position:"relative",zIndex:1,maxWidth:700,width:"100%"}}>
          <div className="anim-1">
            <img src={LOGO_B64} alt="Golden Care Style" className="hero-logo" />
          </div>
          <div className="hero-eyebrow anim-1">✦ Trusted Importer · Antilia ✦</div>
          <h1 className="hero-title anim-2">Golden Care Style</h1>
          <div className="hero-sub-title anim-2">Health &amp; Beauty</div>
          <div className="ornament-line anim-3"><span>✦</span></div>
          <p className="hero-desc anim-3">
            Authentic imported medical care items, skincare, supplements & more.<br/>Trusted by thousands across Antilia.
          </p>
          <div className="hero-btns anim-4">
            <button className="btn-primary" onClick={()=>scrollTo('products')}>Shop Now →</button>
            <button className="btn-outline" onClick={()=>scrollTo('reviews')}>See Reviews</button>
          </div>
          <div className="stats-row anim-4">
            <div className="stat-box"><div className="stat-num">11K+</div><div className="stat-lbl">Followers</div></div>
            <div className="stat-box"><div className="stat-num">100%</div><div className="stat-lbl">Recommend</div></div>
            <div className="stat-box"><div className="stat-num">Real</div><div className="stat-lbl">Imported</div></div>
          </div>
        </div>
      </section>

      {/* PRODUCTS */}
      <section className="sec" id="products" style={{background:"#060400"}}>
        <div className="sec-inner">
          <div style={{textAlign:"center",marginBottom:"clamp(40px,6vw,60px)"}}>
            <div className="sec-label">Our Collection</div>
            <h2 className="sec-title">Featured Products</h2>
            <div className="sec-divider"></div>
            <p className="sec-body" style={{maxWidth:480,margin:"0 auto"}}>100% authentic imported products for your health, beauty &amp; wellness</p>
          </div>
          <div className="product-grid">
            {products.map(p=>(
              <div key={p.id} className="product-card">
                <div className="product-emoji">{p.emoji}</div>
                <div className="product-badge">{p.badge}</div>
                <h3 className="product-name">{p.name}</h3>
                <p className="product-desc">{p.desc}</p>
                <p className="product-details">{p.details}</p>
                <button className="order-btn" onClick={()=>handleOrder(p)}>Order Now</button>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* WHY US */}
      <section className="sec" style={{background:"rgba(212,175,55,0.03)",borderTop:"1px solid rgba(212,175,55,0.1)",borderBottom:"1px solid rgba(212,175,55,0.1)"}}>
        <div className="sec-inner" style={{textAlign:"center"}}>
          <div className="sec-label">Our Promise</div>
          <h2 className="sec-title">Why <span style={{background:"linear-gradient(135deg,var(--gold),var(--gold2))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>Choose Us?</span></h2>
          <div className="sec-divider"></div>
          <div className="features-grid">
            {[
              {icon:"🛡️",title:"100% Authentic",desc:"Every product is genuinely imported and verified"},
              {icon:"🚀",title:"Fast Delivery",desc:"Quick and reliable delivery to your doorstep"},
              {icon:"💬",title:"Trusted by 11K+",desc:"Follow us on Facebook for updates & promos"},
              {icon:"👨‍⚕️",title:"Medical Grade",desc:"Medicated care items & medical equipment"},
            ].map((f,i)=>(
              <div key={i} className="feature-box">
                <div className="feature-icon">{f.icon}</div>
                <div className="feature-title">{f.title}</div>
                <div className="feature-desc">{f.desc}</div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* REVIEWS */}
      <section className="sec" id="reviews">
        <div className="sec-inner">
          <div style={{textAlign:"center",marginBottom:"clamp(40px,6vw,60px)"}}>
            <div className="sec-label">Testimonials</div>
            <h2 className="sec-title">What Our Customers Say</h2>
            <div className="sec-divider"></div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8,flexWrap:"wrap"}}>
              <Stars/>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:14,color:"rgba(245,240,232,0.45)"}}>100% Recommended · 13 Reviews on Facebook</span>
            </div>
          </div>
          <div className="reviews-grid">
            {reviews.map((r,i)=>(
              <div key={i} className="review-card">
                <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:16}}>
                  <div className="review-avatar">{r.avatar}</div>
                  <div>
                    <div className="review-name">{r.name}</div>
                    <Stars/>
                  </div>
                </div>
                <p className="review-text">"{r.text}"</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* CTA */}
      <section className="cta-section" id="contact">
        <h2 className="cta-title">Ready to Order?</h2>
        <p className="cta-desc">Browse our products above or message us directly on Facebook</p>
        <div className="cta-btns">
          <button className="cta-btn-dark" onClick={()=>scrollTo('products')}>Browse Products</button>
          <a href="https://www.facebook.com/share/14YVgSC1Phe/" target="_blank" rel="noreferrer" className="cta-btn-outline-dark">Visit Facebook Page</a>
        </div>
      </section>

      {/* FOOTER */}
      <footer className="footer">
        <img src={LOGO_B64} alt="Logo" className="footer-logo"/>
        <div className="footer-brand">Golden Care Style</div>
        <div className="footer-sub">Antilia · Health &amp; Beauty</div>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,color:"rgba(245,240,232,0.3)",marginTop:12,maxWidth:500,margin:"12px auto 0"}}>
          Importing medicated care items, medical equipment, men's &amp; women's care, baby food &amp; skincare
        </div>
        <div className="footer-copy">© 2025 Golden Care Style. All rights reserved.</div>
      </footer>

      {/* FLOAT */}
      <a href="https://www.facebook.com/share/14YVgSC1Phe/" target="_blank" rel="noreferrer" className="float-btn">
        <span style={{fontSize:18}}>💬</span> Message Us
      </a>

      {/* MODAL */}
      {orderProduct&&(
        <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)setOrderProduct(null);}}>
          <div className="modal-box">
            <button className="modal-close" onClick={()=>setOrderProduct(null)}>✕</button>
            {!submitted?(
              <>
                <div style={{fontSize:32,marginBottom:8}}>{orderProduct.emoji}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,marginBottom:4}}>{orderProduct.name}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:13,color:"rgba(245,240,232,0.45)",marginBottom:20}}>{orderProduct.details}</div>
                <div style={{height:1,background:"rgba(212,175,55,0.2)",marginBottom:20}}></div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:11,color:"var(--gold)",letterSpacing:2,marginBottom:14,textTransform:"uppercase"}}>Your Details</div>
                <input className="form-input" placeholder="Full Name *" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
                <input className="form-input" placeholder="Phone Number *" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})}/>
                <input className="form-input" placeholder="Delivery Address" value={form.address} onChange={e=>setForm({...form,address:e.target.value})}/>
                <input className="form-input" type="number" placeholder="Quantity" min={1} value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})}/>
                <button className="order-btn" style={{marginTop:8}} onClick={handleSubmit}>Confirm Order →</button>
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:12,color:"rgba(245,240,232,0.3)",textAlign:"center",marginTop:10}}>We'll contact you to confirm price &amp; delivery details</p>
              </>
            ):(
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:52,marginBottom:12}}>🎉</div>
                <div style={{fontFamily:"'Cinzel',serif",fontSize:22,color:"var(--gold)",marginBottom:12}}>Order Received!</div>
                <p style={{fontFamily:"'Cormorant Garamond',serif",color:"rgba(245,240,232,0.6)",lineHeight:1.8,marginBottom:8,fontSize:15}}>
                  Thank you, <strong style={{color:"var(--cream)"}}>{form.name}</strong>! We'll reach out to <strong style={{color:"var(--cream)"}}>{form.phone}</strong> to confirm:
                </p>
                <p style={{fontFamily:"'Cinzel',serif",fontSize:14,color:"var(--gold)",marginBottom:24}}>{orderProduct.name} × {form.qty}</p>
                <a href="https://www.facebook.com/share/14YVgSC1Phe/" target="_blank" rel="noreferrer" style={{display:"inline-block",background:"linear-gradient(135deg,var(--gold),var(--gold2))",color:"#060400",padding:"12px 28px",borderRadius:2,fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:12,textDecoration:"none",letterSpacing:2}}>Message on Facebook</a>
                <div style={{marginTop:14}}>
                  <button style={{background:"none",border:"1px solid rgba(212,175,55,0.25)",color:"rgba(245,240,232,0.45)",padding:"10px 24px",borderRadius:2,cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:11,letterSpacing:1}} onClick={()=>setOrderProduct(null)}>Continue Shopping</button>
                </div>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

